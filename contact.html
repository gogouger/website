<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="index, follow, noimageindex">
<title>Contact — Gordon Gouger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=10">
<script src="site.js?v=10" defer></script>
</head>
<body>
  <div class="wrap">
    <header class="site-head">
      <a class="monogram" href="index.html" aria-label="Gordon Gouger — home">
        <svg viewBox="0 0 100 100" role="img" aria-hidden="true" fill="none" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round">
          <path class="g-accent" d="M77.71 34 A32 32 0 1 0 82 50 L60 50"/>
          <path class="g-ink" d="M65.59 41 A18 18 0 1 0 68 50 L54 50"/>
        </svg>
      </a>
      <nav class="nav">
        <a href="index.html">home</a>
        <a href="about.html">about</a>
        <a href="projects.html">projects</a>
        <a href="writing.html">writing</a>
        <a href="resume.html">résumé</a>
        <a href="contact.html" aria-current="page">contact</a>
      </nav>
      <span class="clock" id="clock">--:--:-- MT</span>
    </header>

    <h1 class="page-title scram">Contact</h1>
    <p class="intro">Have a question, a project in mind, or just want to say hello? Send a note and I'll get back to you.</p>

    <form class="form" id="contactForm" action="/contact" method="POST" enctype="multipart/form-data">
      <div class="field">
        <label for="name">Name</label>
        <input id="name" name="name" type="text" autocomplete="name" required>
      </div>
      <div class="field">
        <label for="email">Your email</label>
        <input id="email" name="email" type="email" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="message">Message</label>
        <textarea id="message" name="message" required></textarea>
      </div>
      <div class="field">
        <label for="files">Attachments <span style="color:var(--muted);font-weight:normal;font-size:12px;">— optional, up to 3 files, 5 MB each</span></label>
        <input id="files" name="files" type="file" multiple
               accept=".pdf,.doc,.docx,.txt,.png,.jpg,.jpeg,.webp,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,text/plain,image/*">
      </div>
      <button class="btn" type="submit">Send message</button>
      <p class="form-status" id="contactStatus" role="status" hidden></p>
    </form>

    <p class="intro" style="font-size:13px; margin-top:26px;">Prefer LinkedIn? <a href="https://www.linkedin.com/in/gordon-gouger/" target="_blank" rel="noopener">Reach me there &#8594;</a></p>

    <div class="colophon">
      <a href="https://auth.gordongouger.com" data-app="auth">log in</a>
      <button class="toggle" id="themeBtn">dark</button>
    </div>
  </div>

  <div class="margin-note" id="marginNote"></div>
</body>
</html>
