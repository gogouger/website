<link rel="stylesheet" href="styles.css">

</head>
<body>
  <div class="wrap">
    <header class="site-head">
      <a class="monogram" href="index.html" aria-label="Gordon Gouger — home">
        <svg viewBox="0 0 100 100" role="img" aria-hidden="true" fill="none" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round">
          <path class="g-accent" d="M77.71 34 A32 32 0 1 0 82 50 L60 50"/>
          <path class="g-ink" d="M65.59 41 A18 18 0 1 0 68 50 L54 50"/>
        </svg>
      </a>
      <nav class="nav">
        <a href="index.html">home</a>
        <a href="about.html">about</a>

        <a href="writing.html">writing</a>

      </nav>
      <span class="clock" id="clock">--:--:-- MT</span>
    </header>

    <h1 class="page-title scram">Contact</h1>
    <p class="intro">Have a question, a project in mind, or just want to say hello? Send a note and I'll get back to you.</p>

    <form class="form" action="https://formspree.io/f/REPLACE_ME" method="POST">
      <div class="field">
        <label for="name">Name</label>
        <input id="name" name="name" type="text" autocomplete="name" required>
      </div>
      <div class="field">
        <label for="email">Your email</label>
        <input id="email" name="email" type="email" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="message">Message</label>
        <textarea id="message" name="message" required></textarea>
      </div>
      <button class="btn" type="submit">Send message</button>
    </form>

    <p class="intro" style="font-size:13px; margin-top:26px;">Prefer LinkedIn? <a href="https://www.linkedin.com/in/gordon-gouger/" target="_blank" rel="noopener">Reach me there &#8594;</a></p>

    <div class="colophon">
      <span class="hint">Set in IBM Plex Mono. Built in Denver.</span>
      <button class="toggle" id="themeBtn">dark</button>
    </div>
  </div>

  <div class="margin-note" id="marginNote"></div>
</body>
</html>
